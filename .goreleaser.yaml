version: 2

project_name: x-skills

builds:
  - id: x-skills
    main: ./cmd/x-skills
    binary: x-skills
    env:
      - CGO_ENABLED=0
    ldflags:
      - >-
        -s -w
        -X github.com/InkyQuill/x-skills/internal/buildinfo.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: x-skills
    ids:
      - x-skills
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: >-
    {{- if index .Env "X_SKILLS_SNAPSHOT_VERSION" -}}
    {{- index .Env "X_SKILLS_SNAPSHOT_VERSION" -}}
    {{- else -}}
    {{- incpatch .Version }}-next
    {{- end -}}

release:
  extra_files:
    - glob: scripts/install.sh
    - glob: scripts/install.ps1
